services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-chatbot}
      POSTGRES_USER:     ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5433:5432"  # Expose for local development; remove in production

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:        postgres://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot_secret}@postgres:5432/${POSTGRES_DB:-chatbot}
      JWT_SECRET:          ${JWT_SECRET:-change-me-in-production-use-a-long-random-string}
      JWT_ALGORITHM:       HS256
      JWT_EXPIRE_MINUTES:  ${JWT_EXPIRE_MINUTES:-10080}
      DEBUG:               ${DEBUG:-false}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatbot-network
    # Port is NOT exposed to the host — nginx is the only ingress point.
    # Uncomment the line below if you need direct backend access during dev:
    # ports:
    #   - "8000:8000"

  # ── Nginx (React SPA + reverse proxy) ─────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""   # empty → browser uses same-origin relative paths
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - chatbot-network

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  chatbot-network:
