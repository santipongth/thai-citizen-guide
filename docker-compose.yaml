services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-chatbot}
      POSTGRES_USER:     ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # ports:
    #   - "9092:5432"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot_secret}@postgres:5432/${POSTGRES_DB:-chatbot}
    depends_on:
      - postgres
    networks:
      - chatbot-network

  agent-proxy:
    build:
      context: ./agent-proxy
      target: ${BUILD_TARGET:-production}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot_secret}@postgres:5432/${POSTGRES_DB:-chatbot}
    volumes:
      - ./agent-proxy:/app
    depends_on:
      - postgres
    networks:
      - chatbot-network

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    networks:
      - chatbot-network

  nginx:
    image: nginx
    restart: unless-stopped
    volumes:
      # - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
      - agent-proxy
      - otel-collector
      - zipkin
    networks:
      - chatbot-network
    ports:
      - "${PORT:-80}:80"

  otel-collector:
    image: otel/opentelemetry-collector
    restart: unless-stopped
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml
    networks:
      - chatbot-network

  zipkin:
    image: openzipkin/zipkin
    restart: unless-stopped
    networks:
      - chatbot-network

volumes:
  postgres_data:

networks:
  chatbot-network:
