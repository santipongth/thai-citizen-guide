services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-chatbot}
      POSTGRES_USER:     ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # ports:
    #   - "9092:5432"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL:        postgres://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot_secret}@postgres:5432/${POSTGRES_DB:-chatbot}
      JWT_SECRET:          ${JWT_SECRET:-change-me-in-production-use-a-long-random-string}
      JWT_ALGORITHM:       HS256
      JWT_EXPIRE_MINUTES:  ${JWT_EXPIRE_MINUTES:-10080}
      DEBUG:               ${DEBUG:-false}
      PARSE_SPEC_URL:      ${PARSE_SPEC_URL:-http://thaillm.or.th/api/openthaigpt/v1/chat/completions}
      PARSE_SPEC_API_KEY:  ${PARSE_SPEC_API_KEY:-}
      PARSE_SPEC_TIMEOUT:  ${PARSE_SPEC_TIMEOUT:-60}
      PARSE_SPEC_LLM_MODEL: ${PARSE_SPEC_LLM_MODEL:-/model}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatbot-network

  agent-proxy:
    build:
      context: ./agent-proxy
      target: ${BUILD_TARGET:-production}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-chatbot_secret}@postgres:5432/${POSTGRES_DB:-chatbot}
    volumes:
      - ./agent-proxy:/app
    depends_on:
      - postgres
    networks:
      - chatbot-network

  frontend:
    build:
      context: .
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    networks:
      - chatbot-network

  nginx:
    image: nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - chatbot-network
    ports:
      - "${PORT:-80}:80"

volumes:
  postgres_data:

networks:
  chatbot-network:
