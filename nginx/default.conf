# ── Nginx reverse-proxy + static file server ─────────────────────────────────
#
#  Traffic routing (all on port 80):
#    /api/*       → backend:8000  (FastAPI REST)
#    /sse         → backend:8000  (MCP SSE stream — OneChat spec, GET, long-lived)
#    /messages/*  → backend:8000  (MCP SSE messages — OneChat spec, POST)
#    /mcp/*       → backend:8000  (FastMCP streamable-HTTP — legacy)
#    /docs*       → backend:8000  (Swagger UI)
#    /redoc*      → backend:8000  (ReDoc)
#    /health      → backend:8000  (health endpoint)
#    /*           → /usr/share/nginx/html  (React SPA static files)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Static files (React SPA) ─────────────────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # Increase client body size for potential file uploads
    client_max_body_size 20M;

    # ── API → FastAPI backend ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── MCP SSE — OneChat spec (GET /sse  +  POST /messages/) ───────────────
    location = /sse {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location /messages/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── MCP streamable-HTTP (legacy) ─────────────────────────────────────────
    location /mcp/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # SSE requires these to be disabled
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── Swagger / ReDoc ──────────────────────────────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health endpoint ──────────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
    }

    # ── React SPA fallback ───────────────────────────────────────────────────
    # Any path not matched above is served as index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
